<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICFES Saber 11 - Estudio Diario</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1a237e, #283593); color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header span { font-size: 13px; opacity: 0.8; }

  .nav { display: flex; background: white; border-bottom: 2px solid #e0e0e0; }
  .nav-btn { flex: 1; padding: 12px 8px; border: none; background: none; cursor: pointer; font-size: 13px; color: #666; font-weight: 500; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .nav-btn.active { color: #1a237e; border-bottom-color: #1a237e; }
  .nav-btn:hover { background: #f5f5f5; }

  .page { display: none; padding: 20px; max-width: 760px; margin: 0 auto; }
  .page.active { display: block; }

  /* HOME */
  .area-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .area-card { background: white; border-radius: 12px; padding: 20px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; position: relative; overflow: hidden; }
  .area-card:hover { border-color: #1a237e; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .area-card.selected { border-color: #1a237e; background: #e8eaf6; }
  .area-card .icon { font-size: 32px; margin-bottom: 8px; }
  .area-card h3 { font-size: 14px; font-weight: 600; color: #1a237e; }
  .area-card .progress-bar { height: 4px; background: #e0e0e0; border-radius: 2px; margin-top: 8px; }
  .area-card .progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #1a237e, #5c6bc0); transition: width 0.4s; }
  .area-card .pct { font-size: 11px; color: #888; margin-top: 4px; }

  .start-btn { width: 100%; margin-top: 20px; padding: 16px; background: linear-gradient(135deg, #1a237e, #283593); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .start-btn:hover { opacity: 0.9; }
  .start-btn:disabled { background: #ccc; cursor: not-allowed; }

  .today-badge { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #2e7d32; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  /* QUIZ */
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .quiz-area-tag { background: #e8eaf6; color: #1a237e; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .quiz-progress { font-size: 13px; color: #666; }
  .quiz-score-live { font-size: 13px; font-weight: 600; color: #1a237e; }

  .progress-quiz { height: 6px; background: #e0e0e0; border-radius: 3px; margin-bottom: 20px; }
  .progress-quiz-fill { height: 100%; background: linear-gradient(90deg, #1a237e, #5c6bc0); border-radius: 3px; transition: width 0.3s; }

  .question-box { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .question-num { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
  .question-text { font-size: 15px; color: #212121; line-height: 1.6; }
  .question-context { background: #f9f9f9; border-left: 3px solid #5c6bc0; padding: 12px; border-radius: 0 8px 8px 0; margin: 12px 0; font-size: 13px; color: #444; line-height: 1.5; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: white; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; text-align: left; font-size: 14px; color: #333; transition: all 0.2s; }
  .option-btn:hover:not(:disabled) { border-color: #5c6bc0; background: #f3f4fc; }
  .option-btn .letra { font-weight: 700; color: #5c6bc0; min-width: 20px; }
  .option-btn.correct { border-color: #2e7d32; background: #e8f5e9; }
  .option-btn.correct .letra { color: #2e7d32; }
  .option-btn.wrong { border-color: #c62828; background: #ffebee; }
  .option-btn.wrong .letra { color: #c62828; }
  .option-btn:disabled { cursor: not-allowed; }

  .feedback-box { background: white; border-radius: 12px; padding: 16px; margin-top: 12px; border-left: 4px solid #e0e0e0; }
  .feedback-box.correct { border-color: #2e7d32; }
  .feedback-box.wrong { border-color: #c62828; }
  .feedback-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .feedback-title.correct { color: #2e7d32; }
  .feedback-title.wrong { color: #c62828; }
  .feedback-text { font-size: 13px; color: #444; line-height: 1.6; }
  .loading-explanation { font-size: 13px; color: #888; font-style: italic; }

  .next-btn { width: 100%; padding: 14px; background: #1a237e; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px; }
  .next-btn:hover { background: #283593; }

  /* RESULTS */
  .result-card { background: white; border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 16px; }
  .result-score { font-size: 56px; font-weight: 700; color: #1a237e; }
  .result-label { font-size: 14px; color: #666; margin-top: 4px; }
  .result-msg { font-size: 16px; font-weight: 600; color: #333; margin-top: 12px; }
  .area-results { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
  .area-result-item { background: white; border-radius: 10px; padding: 14px; text-align: center; }
  .area-result-item .ar-name { font-size: 12px; color: #666; }
  .area-result-item .ar-score { font-size: 22px; font-weight: 700; color: #1a237e; }
  .area-result-item .ar-bar { height: 4px; background: #e0e0e0; border-radius: 2px; margin-top: 6px; }
  .area-result-item .ar-fill { height: 100%; border-radius: 2px; }

  .repeat-btn { width: 100%; padding: 14px; background: white; border: 2px solid #1a237e; color: #1a237e; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .home-btn-r { width: 100%; padding: 14px; background: #1a237e; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }

  /* STATS */
  .stats-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 12px; }
  .stats-title { font-size: 15px; font-weight: 700; color: #1a237e; margin-bottom: 14px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 13px; color: #555; }
  .stat-val { font-size: 14px; font-weight: 700; color: #1a237e; }
  .area-stat { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .area-stat-name { font-size: 13px; font-weight: 600; color: #333; display: flex; justify-content: space-between; }
  .area-stat-bar { height: 8px; background: #e0e0e0; border-radius: 4px; }
  .area-stat-fill { height: 100%; border-radius: 4px; }
  .day-history { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .day-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 8px 10px; background: #f9f9f9; border-radius: 8px; }
  .day-score-tag { padding: 2px 10px; border-radius: 12px; font-weight: 700; font-size: 12px; }
  .clear-btn { width: 100%; padding: 12px; background: white; border: 2px solid #c62828; color: #c62828; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }

  .emoji-big { font-size: 48px; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📚 ICFES Saber 11 — Estudio Diario</h1>
    <span id="fecha-hoy"></span>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showPage('home')">🏠 Inicio</button>
  <button class="nav-btn" onclick="showPage('quiz')" id="nav-quiz">📝 Practicar</button>
  <button class="nav-btn" onclick="showPage('stats')">📊 Estadísticas</button>
</div>

<!-- HOME -->
<div class="page active" id="page-home">
  <div id="today-info"></div>
  <p style="font-size:14px;color:#555;margin-bottom:12px;">Selecciona las áreas que quieres practicar hoy (5 preguntas por área):</p>
  <div class="area-grid" id="area-grid"></div>
  <button class="start-btn" id="start-btn" onclick="startQuiz()">▶ Comenzar práctica</button>
</div>

<!-- QUIZ -->
<div class="page" id="page-quiz">
  <div class="quiz-header">
    <span class="quiz-area-tag" id="quiz-area-tag">Área</span>
    <span class="quiz-progress" id="quiz-progress">1 / 5</span>
    <span class="quiz-score-live" id="quiz-score-live">✓ 0</span>
  </div>
  <div class="progress-quiz"><div class="progress-quiz-fill" id="progress-bar" style="width:0%"></div></div>
  <div id="quiz-content"></div>
</div>

<!-- RESULTS -->
<div class="page" id="page-results">
  <div id="results-content"></div>
</div>

<!-- STATS -->
<div class="page" id="page-stats">
  <div id="stats-content"></div>
</div>

<script>
// ========== BANCO DE PREGUNTAS ==========
const PREGUNTAS = {
  sociales: [
    {
      id:'s1', num:1,
      texto:'La administradora de un conjunto residencial prohíbe tener mascotas alegando que son agresivas basándose en videos de internet. Los dueños de mascotas se quejan. ¿Es válido el argumento de la administración?',
      opciones:['Sí, porque busca velar por el bienestar de los niños.','Sí, porque las redes sociales son el principal medio de información.','No, porque está generalizando el comportamiento de todas las mascotas.','No, porque es conocimiento general que todas las mascotas son dóciles.'],
      respuesta:2,
      explicacion:'La administradora comete una GENERALIZACIÓN: ver videos de algunas mascotas agresivas no significa que TODAS las mascotas lo sean. En el ICFES, cuando un argumento saca una conclusión general a partir de pocos casos, se llama "generalización apresurada" y se considera inválido.'
    },
    {
      id:'s2', num:2,
      texto:'Simón Bolívar en su Última Proclama habló de consolidar la unión y se separó del mando al desconfiar de sí mismo. ¿En cuál contexto histórico pronunció estas palabras?',
      opciones:['Al final de la guerra de los Mil Días en 1902.','En 1810, al proponer la libertad de vientres.','Al inicio de las guerras de independencia por falta de apoyo.','En 1830, al disolverse la Gran Colombia por la desconexión territorial y oposición a su dictadura.'],
      respuesta:3,
      explicacion:'La Última Proclama de Bolívar (1830) ocurrió cuando la Gran Colombia se disolvió. Bolívar habla de "consolidar la unión" porque esa unión (Venezuela, Colombia, Ecuador) estaba rompiéndose. Además menciona "la oposición a su desprendimiento", refiriéndose a quienes se oponían a él.'
    },
    {
      id:'s3', num:3,
      texto:'Los papas Juan Pablo II (1987) y Benedicto XVI (2008) hablaron sobre el divorcio. ¿Cómo cambió la visión entre ambos discursos?',
      opciones:['Cambió radicalmente: el primero ve el divorcio como ofensa a Dios, el segundo no.','Cambió parcialmente: ambos consideran que el divorcio atenta contra Dios y la familia, pero el segundo abre la posibilidad de perdón para quienes se divorcian.','Cambió radicalmente: el primero defiende la familia y el segundo no.','Cambió radicalmente: el primero cree que la libertad debe estar sujeta a leyes divinas, y el segundo no.'],
      respuesta:1,
      explicacion:'Ambos papas coinciden en que el divorcio es malo (no cambio radical). Pero Juan Pablo II es más estricto, mientras Benedicto XVI dice que la Iglesia "piensa en los hombres y mujeres que han cometido estos actos" y busca su recuperación, es decir, abre la puerta al perdón. Por eso el cambio es PARCIAL.'
    },
    {
      id:'s4', num:4,
      texto:'Un gobierno reemplaza luminarias por LED que favorecen el reconocimiento facial. Ecologistas advierten que afecta animales silvestres. ¿Qué derecho colectivo puede verse vulnerado?',
      opciones:['La calidad del servicio del alumbrado público.','El disfrute de un ambiente sano, ya que omitir la protección de la fauna afecta la preservación de los ecosistemas.','La garantía de un desarrollo sostenible porque la energía proviene de hidroeléctrica.','La destinación del espacio público al uso común.'],
      respuesta:1,
      explicacion:'El problema es ambiental: la luz artificial nocturna daña a los animales silvestres y eso afecta la BIODIVERSIDAD. Esto vulnera el derecho al AMBIENTE SANO, que incluye proteger fauna y ecosistemas para las generaciones presentes y futuras. Las otras opciones hablan de temas que no aparecen en el texto.'
    },
    {
      id:'s5', num:5,
      texto:'Leonardo dice que un científico famoso afirmó que existe vida extraterrestre, y que por eso no le queda duda. Juana dice que el argumento es inválido. ¿Tiene razón Juana?',
      opciones:['No, porque la veracidad depende de la persona que realiza la afirmación.','Sí, porque la veracidad de un argumento no depende solo de quien lo dice, sino de las evidencias que lo apoyan.','No, porque Leonardo presentó su opinión y cualquier opinión es un argumento válido.','Sí, porque Leonardo presentó un argumento que contradice la opinión de Juana.'],
      respuesta:1,
      explicacion:'Esto es lo que se llama "argumento de autoridad": decir que algo es verdad porque lo dijo alguien famoso. En el ICFES, ese tipo de argumento es DÉBIL porque lo que hace válido un argumento son las EVIDENCIAS y las pruebas, no el prestigio de quien lo dice.'
    },
    {
      id:'s6', num:6,
      texto:'Brasil tiene un movimiento que limita contenidos escolares de género, sexualidad, política y filosofía. Si se aplicara en Colombia, ¿por qué iría en contra de la Constitución?',
      opciones:['Porque solo los jueces colombianos pueden impulsar estas leyes.','Porque solo el Ministerio de Educación puede definir el contenido escolar.','Porque va en contra de las libertades fundamentales de opinión y pensamiento, entre otros derechos consagrados en la Constitución.','Porque la Constitución se escribió primero y deben revisarse las normas antiguas antes.'],
      respuesta:2,
      explicacion:'La Constitución Política de Colombia protege la LIBERTAD DE OPINIÓN, PENSAMIENTO y CÁTEDRA. Limitar temas en la escuela por considerarlos "no neutrales" va directamente en contra de estos derechos fundamentales. Las otras opciones mezclan temas que no son el punto central.'
    },
    {
      id:'s7', num:7,
      texto:'La industria del aceite de palma genera empleo pero también daño ambiental. La ministra propone prohibir todos los productos con aceite de palma. ¿Cuál NO es un posible impacto de esa solución?',
      opciones:['Afectaría negativamente los ingresos de muchos habitantes de las grandes ciudades.','Mejoraría el medio ambiente, pues los suelos serían más fértiles.','Afectaría la producción de otros bienes que tienen como ingrediente principal el aceite de palma.','Mejoraría las posibilidades de encontrar empleo de quienes habitan las zonas donde se cultiva la palma.'],
      respuesta:3,
      explicacion:'La pregunta pide lo que NO es un impacto de PROHIBIR el aceite de palma. Si se prohíbe, la industria de la palma se cae → las personas que trabajan en esas zonas PERDERÍAN empleo, no lo ganarían. Por eso la opción D es la que NO corresponde como impacto real de la propuesta.'
    },
    {
      id:'s8', num:8,
      texto:'Una persona dice que una película infantil "promueve la agenda LGBT en los corazones y las mentes de nuestros niños". ¿Cuál es una posible consecuencia directa de esta afirmación?',
      opciones:['Que los estadounidenses crean que se desconoce la libertad de expresión.','Que la comunidad LGBT sienta que está siendo juzgada negativamente y su presencia es rechazada, especialmente cuando hay niños cerca.','Que la comunidad cristiana sienta que la mejor forma de hacer valer sus creencias es dejar de ver películas.','Que la compañía piense que la comunidad LGBT debe incluirse más en sus producciones.'],
      respuesta:1,
      explicacion:'La afirmación presenta la presencia LGBT como algo peligroso para los niños. La consecuencia DIRECTA es que la comunidad LGBT se sienta RECHAZADA y juzgada negativamente. Las otras opciones son posibles, pero no son la consecuencia más directa e inmediata del mensaje del texto.'
    },
    {
      id:'s9', num:9,
      texto:'En una ciudad hay muchos perros y gatos abandonados. Estudiantes proponen hacer jornadas de esterilización y adopción. ¿Qué tipo de impacto tiene esa propuesta en la salud pública?',
      opciones:['Positivo, porque las personas son más felices cuando adoptan un animal.','Positivo, porque las esterilizaciones desaceleran el crecimiento de la población animal y se evita la transmisión de enfermedades como la rabia.','Negativo, porque los recursos se destinarán a procedimientos médicos que podrían invertirse en salarios de los veterinarios.','Negativo, porque en las jornadas de esterilización se pueden propagar las enfermedades de los animales.'],
      respuesta:1,
      explicacion:'La esterilización tiene dos efectos directos en salud pública: 1) Controla la población de animales callejeros (menos sobrepoblación), 2) Reduce la transmisión de enfermedades zoonóticas (que pasan del animal al humano) como la RABIA. Por eso el impacto es POSITIVO y DIRECTO en salud pública.'
    },
    {
      id:'s10', num:10,
      texto:'Rodrigo Londoño habla de reconciliación y perdón post-acuerdo. Jorge Briceño dice que "el fusil es el garante" y que seguirán combates. ¿Qué relación temporal tienen estos discursos?',
      opciones:['El de Londoño antecede al de Briceño, porque Briceño menciona el reconocimiento de las FARC como partido político.','El de Londoño antecede al de Briceño, porque Briceño da cuenta del cese al fuego definitivo.','El de Briceño antecede al de Londoño, porque Londoño señala que las FARC ya son parte del Gobierno.','El de Briceño antecede al de Londoño, porque este último da cuenta de un panorama de aspiraciones políticas fruto de las negociaciones de paz; el otro, de unas negociaciones en proceso.'],
      respuesta:3,
      explicacion:'Briceño habla de que "aún no hay cese al fuego" y que seguirán combates → es durante la guerra. Londoño habla de "reconciliación, perdón y aspiraciones políticas" → es después del acuerdo de paz. Por eso Briceño va PRIMERO (guerra) y Londoño va DESPUÉS (post-acuerdo).'
    },
    {
      id:'s11', num:11,
      texto:'Un artículo habla de la apertura económica del gobierno Barco: abrir puertas a importaciones, capital foráneo y diversificar exportaciones. ¿Por qué se refiere a la apertura económica?',
      opciones:['Porque señala la importancia de proteger la industria nacional frente a la competencia extranjera.','Porque insiste en la necesidad de fomentar el libre comercio y la reducción de las barreras para el intercambio comercial entre países.','Porque advierte sobre la necesidad de elaborar políticas que reduzcan la pobreza extrema.','Porque reconoce el impacto negativo que la globalización puede tener en el empleo.'],
      respuesta:1,
      explicacion:'La apertura económica significa justamente lo contrario al proteccionismo: ABRIR el mercado al comercio internacional, reducir barreras, permitir importaciones y exportaciones. El texto dice que antes había "proteccionismo" que estancaba el comercio, y Barco decidió abrir las puertas. Eso es libre comercio.'
    },
    {
      id:'s12', num:12,
      texto:'Gremios minero y petrolero quieren explotar la Amazonia. Pueblos indígenas aislados la protegen. ¿Entre quiénes sería más probable que se genere un conflicto?',
      opciones:['Entre los pueblos indígenas y los académicos.','Entre el gremio minero y los pueblos indígenas.','Entre el Ministerio de Minas y Energía y el gremio petrolero.','Entre los grupos madereros ilegales y el gremio petrolero.'],
      respuesta:1,
      explicacion:'Los intereses DIRECTAMENTE OPUESTOS son: los gremios (quieren explotar) vs. los pueblos indígenas (quieren proteger su territorio). Los académicos apoyan a los indígenas, no se oponen. El Ministerio es mediador. Por eso el conflicto más probable es entre mineros/petroleros e indígenas.'
    },
    {
      id:'s13', num:13,
      texto:'¿Cuál reacción NO se tuvo en cuenta en la propuesta del Ministerio de Minas sobre la Amazonia?',
      opciones:['Que los gremios solo quieran beneficiarse ilegalmente.','Que los académicos no tengan en cuenta los beneficios del modelo extractivo legal.','Que los pueblos indígenas aislados voluntariamente no acepten entablar ningún tipo de relación con la sociedad occidental.','Que los grupos madereros ilegales no tengan vías para negociar la explotación legal.'],
      respuesta:2,
      explicacion:'La propuesta del Ministerio busca reunir a gremios con comunidades indígenas para negociar. Pero NO consideró que los pueblos AISLADOS VOLUNTARIAMENTE NO QUIEREN NINGÚN CONTACTO con el mundo occidental, ni para negociar. Ese es el punto que se ignoró.'
    },
    {
      id:'s14', num:14,
      texto:'Campesinos paperos afectados por TLC deciden crear mercados campesinos para vender sin intermediarios. ¿Qué dimensiones se privilegiaron en esa solución?',
      opciones:['Social y política.','Cultural y social.','Económica y cultural.','Política y comercial.'],
      respuesta:2,
      explicacion:'Los mercados campesinos buscan: 1) MEJORAR INGRESOS (dimensión económica: vender a mejores precios), 2) RESCATAR TRADICIONES (dimensión cultural: recuperar prácticas olvidadas del campo). El texto explícitamente menciona ambas. Por eso la respuesta es Económica y cultural.'
    },
    {
      id:'s15', num:15,
      texto:'Adam Smith dice que la división del trabajo aumenta la productividad porque cada persona se especializa en lo que hace mejor. Según esto, para Smith, el mercado...',
      opciones:['Genera injusticias sociales al separar a las personas en clases sociales según sus ingresos.','Lleva la economía al fracaso porque no hay coordinación entre productores y consumidores.','Hace que las personas se vuelvan más ignorantes porque no saben cómo producir ciertos bienes.','Es una forma eficiente de repartir los bienes que se han producido mediante la especialización.'],
      respuesta:3,
      explicacion:'Smith argumenta: cada quien hace lo que mejor sabe → más productividad → luego intercambia en el mercado. El mercado entonces es el mecanismo que DISTRIBUYE eficientemente lo que cada quien produce con su especialización. Es la base del liberalismo económico clásico.'
    },
    {
      id:'s16', num:16,
      texto:'Las Zonas Veredales Transitorias (ZVTN) son lugares donde el ejército custodia a los guerrilleros en vez de combatirlos. ¿Por qué es posible esta situación?',

function loadStats() {
  try { return JSON.parse(localStorage.getItem('icfes_stats') || '{}'); } catch(e) { return {}; }
}
function saveStats() {
  localStorage.setItem('icfes_stats', JSON.stringify(state.stats));
}

// ========== UTILS ==========
function getTodayKey() {
  return new Date().toISOString().slice(0,10);
}
function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ========== NAVEGACIÓN ==========
function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  const idx = ['home','quiz','stats'].indexOf(id);
  document.querySelectorAll('.nav-btn')[idx < 2 ? idx : 2].classList.add('active');
  if(id==='home') renderHome();
  if(id==='stats') renderStats();
}

// ========== HOME ==========
function renderHome() {
  document.getElementById('fecha-hoy').textContent = new Date().toLocaleDateString('es-CO',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  // Today info
  const todayKey = getTodayKey();
  const todayData = state.stats[todayKey];
  let todayHtml = '';
  if(todayData) {
    todayHtml = `<div class="today-badge">✅ Hoy completaste ${todayData.total} preguntas — Puntaje: <strong>${todayData.correct}/${todayData.total}</strong></div>`;
  }
  document.getElementById('today-info').innerHTML = todayHtml;

  // Area cards
  const grid = document.getElementById('area-grid');
  grid.innerHTML = '';
  Object.entries(AREA_INFO).forEach(([key,info]) => {
    const qs = PREGUNTAS[key] || [];
    const total = state.stats['total_'+key] || 0;
    const correct = state.stats['correct_'+key] || 0;
    const pct = total > 0 ? Math.round((correct/total)*100) : 0;
    const sel = state.selectedAreas.includes(key);
    grid.innerHTML += `
      <div class="area-card ${sel?'selected':''}" onclick="toggleArea('${key}')" id="card-${key}">
        <div class="icon">${info.icon}</div>
        <h3>${info.nombre}</h3>
        <p style="font-size:12px;color:#666;margin-top:4px;">${qs.length} preguntas disponibles</p>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="pct">${total>0?`${correct}/${total} correctas (${pct}%)`:'Sin intentos aún'}</div>
      </div>`;
  });
  updateStartBtn();
}

function toggleArea(key) {
  const idx = state.selectedAreas.indexOf(key);
  if(idx>=0) state.selectedAreas.splice(idx,1);
  else state.selectedAreas.push(key);
  document.querySelectorAll('.area-card').forEach(c=>c.classList.remove('selected'));
  state.selectedAreas.forEach(k=>{ const el=document.getElementById('card-'+k); if(el) el.classList.add('selected'); });
  updateStartBtn();
}

function updateStartBtn() {
  const btn = document.getElementById('start-btn');
  if(state.selectedAreas.length===0) { btn.disabled=true; btn.textContent='Selecciona al menos un área'; }
  else { btn.disabled=false; btn.textContent=`▶ Comenzar (${state.selectedAreas.length} área${state.selectedAreas.length>1?'s':''} · ${state.selectedAreas.length*5} preguntas)`; }
}

// ========== INICIAR QUIZ ==========
function startQuiz() {
  const todayKey = getTodayKey();
  const usedToday = state.stats['used_'+todayKey] || {};

  let sessionQ = [];
  state.selectedAreas.forEach(area => {
    const pool = PREGUNTAS[area] || [];
    const usedIds = usedToday[area] || [];
    const available = pool.filter(q => !usedIds.includes(q.id));
    const pick = shuffle(available.length >= 5 ? available : pool).slice(0,5);
    pick.forEach(q => sessionQ.push({area, q}));
  });

  state.sessionQuestions = shuffle(sessionQ);
  state.currentIdx = 0;
  state.answers = [];
  state.sessionScore = 0;
  state.totalQ = state.sessionQuestions.length;

  showPage('quiz');
  renderQuestion();
}

// ========== QUIZ ==========
function renderQuestion() {
  const {area, q} = state.sessionQuestions[state.currentIdx];
  const info = AREA_INFO[area];
  const num = state.currentIdx + 1;
  const total = state.totalQ;

  document.getElementById('quiz-area-tag').textContent = info.icon + ' ' + info.nombre;
  document.getElementById('quiz-area-tag').style.background = info.fill;
  document.getElementById('quiz-area-tag').style.color = info.color;
  document.getElementById('quiz-progress').textContent = `${num} de ${total}`;
  document.getElementById('quiz-score-live').textContent = `✓ ${state.sessionScore}`;
  document.getElementById('progress-bar').style.width = ((num-1)/total*100) + '%';

  const opts = q.opciones.map((o,i) => `
    <button class="option-btn" onclick="selectOption(${i})" id="opt-${i}">
      <span class="letra">${['A','B','C','D'][i]}</span>
      <span>${o}</span>
    </button>`).join('');

  document.getElementById('quiz-content').innerHTML = `
    <div class="question-box">
      <div class="question-num">Pregunta ${num}</div>
      <div class="question-text">${q.texto}</div>
    </div>
    <div class="options" id="options-container">${opts}</div>
    <div id="feedback-area"></div>`;
}

async function selectOption(idx) {
  const {area, q} = state.sessionQuestions[state.currentIdx];
  const isCorrect = idx === q.respuesta;

  // Disable all buttons
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  document.getElementById('opt-'+q.respuesta).classList.add('correct');
  if(!isCorrect) document.getElementById('opt-'+idx).classList.add('wrong');

  if(isCorrect) state.sessionScore++;
  state.answers.push({area, qId:q.id, correct:isCorrect});

  // Feedback
  const fb = document.getElementById('feedback-area');
  if(isCorrect) {
    fb.innerHTML = `<div class="feedback-box correct">
      <div class="feedback-title correct">✅ ¡Correcto!</div>
      <div class="feedback-text">${q.explicacion}</div>
    </div>
    <button class="next-btn" onclick="nextQuestion()">${state.currentIdx+1 < state.totalQ ? '→ Siguiente pregunta' : '🏁 Ver resultados'}</button>`;
  } else {
    fb.innerHTML = `<div class="feedback-box wrong">
      <div class="feedback-title wrong">❌ Incorrecto — La respuesta era <strong>${['A','B','C','D'][q.respuesta]}</strong></div>
      <div class="feedback-text loading-explanation">💡 ${q.explicacion}</div>
    </div>
    <button class="next-btn" onclick="nextQuestion()">${state.currentIdx+1 < state.totalQ ? '→ Siguiente pregunta' : '🏁 Ver resultados'}</button>`;
  }
}

function nextQuestion() {
  state.currentIdx++;
  if(state.currentIdx >= state.totalQ) {
    saveSession();
    showResults();
  } else {
    renderQuestion();
  }
}

function saveSession() {
  const todayKey = getTodayKey();
  if(!state.stats[todayKey]) state.stats[todayKey] = {correct:0, total:0, areas:{}};

  const usedToday = state.stats['used_'+todayKey] || {};

  state.answers.forEach(({area,qId,correct})=>{
    state.stats['total_'+area] = (state.stats['total_'+area]||0)+1;
    if(correct) state.stats['correct_'+area] = (state.stats['correct_'+area]||0)+1;
    state.stats[todayKey].total++;
    if(correct) state.stats[todayKey].correct++;
    if(!state.stats[todayKey].areas[area]) state.stats[todayKey].areas[area]={correct:0,total:0};
    state.stats[todayKey].areas[area].total++;
    if(correct) state.stats[todayKey].areas[area].correct++;
    if(!usedToday[area]) usedToday[area]=[];
    if(!usedToday[area].includes(qId)) usedToday[area].push(qId);
  });

  state.stats['used_'+todayKey] = usedToday;

  // History
  if(!state.stats.history) state.stats.history=[];
  state.stats.history.unshift({date:todayKey, correct:state.sessionScore, total:state.totalQ, areas:Object.keys(AREA_INFO).filter(k=>state.selectedAreas.includes(k))});
  if(state.stats.history.length>30) state.stats.history=state.stats.history.slice(0,30);

  saveStats();
}

// ========== RESULTADOS ==========
function showResults() {
  showPage('results');
  const pct = Math.round((state.sessionScore/state.totalQ)*100);
  let emoji = pct>=80?'🏆':pct>=60?'👍':pct>=40?'📚':'💪';
  let msg = pct>=80?'¡Excelente! Estás muy bien preparado.':pct>=60?'¡Bien! Sigue practicando.':pct>=40?'Vas bien, pero repasa los temas.':'No te rindas, la práctica hace al maestro.';

  // By area
  const byArea = {};
  state.answers.forEach(({area,correct})=>{
    if(!byArea[area]) byArea[area]={c:0,t:0};
    byArea[area].t++;
    if(correct) byArea[area].c++;
  });

  const areaCards = Object.entries(byArea).map(([area,data])=>{
    const info = AREA_INFO[area];
    const p = Math.round((data.c/data.t)*100);
    return `<div class="area-result-item">
      <div class="ar-name">${info.icon} ${info.nombre}</div>
      <div class="ar-score" style="color:${info.color}">${data.c}/${data.t}</div>
      <div class="ar-bar"><div class="ar-fill" style="width:${p}%;background:${info.color}"></div></div>
      <div style="font-size:11px;color:#888;margin-top:3px">${p}%</div>
    </div>`;
  }).join('');

  document.getElementById('results-content').innerHTML = `
    <div class="result-card">
      <div class="emoji-big">${emoji}</div>
      <div class="result-score">${state.sessionScore}/${state.totalQ}</div>
      <div class="result-label">preguntas correctas</div>
      <div style="font-size:28px;font-weight:700;color:#1a237e;margin-top:8px">${pct}%</div>
      <div class="result-msg">${msg}</div>
    </div>
    <div class="area-results">${areaCards}</div>
    <button class="home-btn-r" onclick="state.selectedAreas=[];showPage('home')">🏠 Volver al inicio</button>
    <button class="repeat-btn" onclick="startQuiz()">🔄 Repetir con las mismas áreas</button>`;

  document.querySelectorAll('.nav-btn')[0].classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{ if(i!==0) b.classList.remove('active'); });
}

// ========== ESTADÍSTICAS ==========
function renderStats() {
  const areas = Object.entries(AREA_INFO);
  const areaStats = areas.map(([key,info])=>{
    const total = state.stats['total_'+key]||0;
    const correct = state.stats['correct_'+key]||0;
    const pct = total>0?Math.round((correct/total)*100):0;
    return `<div class="area-stat">
      <div class="area-stat-name"><span>${info.icon} ${info.nombre}</span><span style="color:${info.color}">${correct}/${total} (${pct}%)</span></div>
      <div class="area-stat-bar"><div class="area-stat-fill" style="width:${pct}%;background:${info.color}"></div></div>
    </div>`;
  }).join('');

  const history = state.stats.history || [];
  const histHtml = history.length===0
    ? '<p style="color:#999;font-size:13px;text-align:center;padding:16px">Aún no tienes sesiones guardadas.</p>'
    : history.slice(0,10).map(h=>{
        const pct=Math.round((h.correct/h.total)*100);
        const color=pct>=80?'#2e7d32':pct>=60?'#e65100':'#c62828';
        const fecha=new Date(h.date+'T12:00:00').toLocaleDateString('es-CO',{weekday:'short',day:'numeric',month:'short'});
        return `<div class="day-item">
          <span>${fecha} · ${h.areas?.map(a=>AREA_INFO[a]?.icon||'').join(' ')||''}</span>
          <span class="day-score-tag" style="background:${color}20;color:${color}">${h.correct}/${h.total} — ${pct}%</span>
        </div>`;
      }).join('');

  // Totals
  let totalC=0, totalT=0;
  areas.forEach(([k])=>{ totalC+=state.stats['correct_'+k]||0; totalT+=state.stats['total_'+k]||0; });
  const globalPct = totalT>0?Math.round((totalC/totalT)*100):0;

  document.getElementById('stats-content').innerHTML = `
    <div class="stats-card">
      <div class="stats-title">📊 Resumen global</div>
      <div class="stat-row"><span class="stat-label">Total preguntas respondidas</span><span class="stat-val">${totalT}</span></div>
      <div class="stat-row"><span class="stat-label">Correctas</span><span class="stat-val">${totalC}</span></div>
      <div class="stat-row"><span class="stat-label">Porcentaje global</span><span class="stat-val">${globalPct}%</span></div>
      <div class="stat-row"><span class="stat-label">Sesiones realizadas</span><span class="stat-val">${history.length}</span></div>
    </div>
    <div class="stats-card">
      <div class="stats-title">📚 Por área</div>
      ${areaStats}
    </div>
    <div class="stats-card">
      <div class="stats-title">📅 Historial reciente</div>
      <div class="day-history">${histHtml}</div>
    </div>
    <button class="clear-btn" onclick="clearStats()">🗑 Borrar todas las estadísticas</button>`;
}

function clearStats() {
  if(confirm('¿Seguro que quieres borrar todas las estadísticas?')) {
    state.stats={};
    saveStats();
    renderStats();
  }
}

// ========== INIT ==========
window.onload = () => {
  renderHome();
};
</script>
</body>
</html>
